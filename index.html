<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Project: Sign-up Form</title>
</head>
<body>
    <div class="left">
        <div class="title">
            <img src="assets/odin-lined.png" alt="Odin logo" height="50">
            <h1>Odin</h1>
        </div>
        <img src="assets/background.jpg" alt="Fern leaves" width="500">
    </div>
    
    <div class="right">
        <div class="top">
            <h2>
                This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams.
                Sign up <em>now</em> to get started.
            </h2>
            <h2>
                You <em>know</em> you want to.
            </h2>
        </div>
        <div class="middle">
            <h2>Let's do this!</h2>
            <form id="form" action="">
                <div class="row">
                    <div class="field">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>
                    
                    <div class="field">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="field">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                </div>
                
                <div class="row">
                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password">
                    </div>

                    <div class="field">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password">
                    </div>
                </div>
            </form>
        </div>
        <div class="bottom">
            <button form="form" type="submit">Create Account</button>
            <p>Already have an account? <strong><a href="">Log in</a></strong></p>
        </div>
</body>
</html>
