<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Project: Sign-up Form</title>
</head>
<body>
    <div class="left">
        Odin
    </div>
    <div class="right">
        <div class="subtitle">
            This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams.
            Sign up <em>now</em> to get started.

            You <em>know</em> you want to.
        </div>
        <div class="form">
            Let's do this!
            <form action="">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name">

                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone">

                <label for="password">Password</label>
                <input type="password" id="password" name="password">

                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password">

                <button type="submit">Create Account</button>
                Already have an account? <a href="">Log in</a>
            </form>
        </div>
    </div>
</body>
</html>
